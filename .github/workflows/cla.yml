name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  actions: write
  contents: read  # 'read' is enough because signatures live in a REMOTE repo
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Run on PR events, on "recheck" comment, or when someone posts the exact signing phrase.
        # IMPORTANT: this phrase must match `custom-pr-sign-comment` below.
        if: >
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read and agree to the Contributor License Agreement'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT required to write to the centralized signatures repo.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Where the CLA document lives (shown to contributors)
          path-to-document: https://github.com/Comfy-Org/comfy-cla/blob/main/comfyui_icla.md

          # Centralized signature storage
          remote-organization-name: comfy-org
          remote-repository-name: comfy-cla
          path-to-signatures: signatures/cla.json
          branch: main

          # Allowlist bots so they don't need to sign (optional, comma-separated)
          allowlist: dependabot[bot],github-actions[bot]

          # Custom PR comment messages
          custom-notsigned-prcomment: |
            Thank you for your contribution! We really appreciate it! 🎉
            
            Like many open source projects, we require contributors to sign our
            [Contributor License Agreement](https://github.com/Comfy-Org/comfy-cla/blob/main/comfyui_icla.md) before we can accept your contribution.

            **Why a Contributor License Agreement (CLA)?**
            
            The CLA exists to clarify the ownership of code contributions, so that everyone (contributors and the project alike) has a clear understanding of how contributed code can be used. The agreement confirms that contributors own their code, retain the right to reuse it, and grant us permission to share it. In turn, it gives us an explicit copyright license to reuse those contributions within our projects.

            A CLA is standard practice among major open source projects, including those backed by the Apache Software Foundation and the Linux community. In fact, our CLA is based on the one used by the Apache Foundation.

            Most importantly, adopting the CLA would allow us to relicense our software under a more permissive license, giving the project and its community greater flexibility going forward.

            **To sign**, please post a new comment on this PR with exactly the following text:

          custom-pr-sign-comment: I have read and agree to the Contributor License Agreement

          custom-allsigned-prcomment: |
            ✅ All contributors have signed the CLA. Thank you! This PR is ready to be merged.
