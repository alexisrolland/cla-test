name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  actions: write
  contents: read          # 'read' is enough because signatures live in a REMOTE repo
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Run on PR events, on "recheck", or when someone posts the exact signing phrase.
        # IMPORTANT: this phrase must match `custom-pr-sign-comment` below.
        if: >
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read and agree to the Contributor License Agreement'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope, required to write to the centralized signatures repo.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # ---- Where the CLA document lives (shown to contributors) ----
          path-to-document: https://github.com/Comfy-Org/comfy-cla/blob/main/comfyui_icla.md

          # ---- Centralized signature storage ----
          remote-organization-name: comfy-org
          remote-repository-name: comfy-cla
          path-to-signatures: signatures/cla.json
          branch: main

          # ---- Allowlist bots so they don't need to sign (optional, comma-separated) ----
          allowlist: dependabot[bot],github-actions[bot]

          # ---- Custom PR comment messages ----
          custom-notsigned-prcomment: |
            Thank you for your contribution to **Comfy**! 🎉

            Before we can merge this PR, every contributor needs to read and sign our
            [Contributor License Agreement](https://github.com/Comfy-Org/comfy-cla/blob/main/comfyui_icla.md).

            **To sign**, please post a new comment on this PR with exactly the following text:

          custom-pr-sign-comment: I have read and agree to the Contributor License Agreement

          custom-allsigned-prcomment: |
            ✅ All contributors have signed the CLA. Thank you! This PR is ready for review.
